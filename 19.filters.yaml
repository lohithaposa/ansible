- name : Filters
  hosts: local
  connection: local
  vars:
    topics: linux, shell, mysql
    tagsMap:
      name: ansible
      project: roboshop
      component: catalogue  

    tagsList: [
        {
            "key": "name",
            "value": "ansible"
        },
        {
            "key": "project",
            "value": "roboshop"
        },
        {
            "key": "component",
            "value": "catalogue"
        }
    ]  
  tasks:
    - name: greeting
      ansible.builtin.debug:
       msg: " Hi ,{{ Greeting | default ('Good Morning') }}"  # deafult is the filter, when variable is undefined or empty 

    - name: convert string to lists
      ansible.builtin.debug:
        msg: " {{ topics | split (',')}}"   

    - name: convert map to list
      ansible.builtin.debug:
       msg: "{{ tagsMap | dict2items }}"  

    - name: convert lists to map
      ansible.builtin.debug:
        msg: "{{ tagsList | items2dict }}"   

    - name: read students yaml
      ansible.builtin.set_fact:  #dynamically setting the variables    
        students_yaml: "{{ lookup ('file', 'students.yaml' )| from_yaml }}"  # lookup is a filter,giving i/p students.yaml .. to find the file students.yaml file.....and give the content to students_yaml variable

    - name: convert yaml to json
      ansible.builtin.debug:
        msg: "{{ students_yaml | to_nice_json }}"    