- name : packages installation by using loops
  hosts: local
  connection: local
  become: yes
  tasks:
   - name : install nginx
     ansible.builtin.package:
       name: "{{ item.name }}"
       state: "{{ item.state }}"
     loop: #lists of map
       - { name: "nginx", state: "absent"} #map/dic
       - { name: "mysql", state: "present"}
       - { name: "python", state: "present"}